spring:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}

jwt:
  secret: test-jwt-secret-key-for-hs256-must-be-at-least-256-bits-long-enough
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

oauth:
  google:
    client-id: test-google-client-id
    client-secret: test-google-client-secret
  kakao:
    client-id: test-kakao-client-id
    client-secret: test-kakao-client-secret

logging:
  level:
    com.eolma.user: DEBUG
