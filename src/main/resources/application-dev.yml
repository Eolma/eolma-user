spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/eolma_user
    username: eolma
    password: eolma-local
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

jwt:
  secret: eolma-dev-secret-key-minimum-256-bits-for-hmac-sha256-algorithm

oauth:
  google:
    client-id: your-google-client-id
    client-secret: your-google-client-secret
  kakao:
    client-id: your-kakao-client-id
    client-secret: your-kakao-client-secret

logging:
  level:
    com.eolma.user: DEBUG
    org.springframework.security: DEBUG
